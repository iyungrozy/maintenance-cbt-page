server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Return 503 for all requests so upstream proxies know the site is down
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        return 503;
    }

    error_page 503 /index.html;

    # Health-check endpoint — returns 200 so Dokploy knows the container is alive
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
